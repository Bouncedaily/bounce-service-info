<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Authenticating…</title></head>
<body>
<script>
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    window.location.replace('login.html' + hash);
  } else {
    window.location.replace('login.html');
  }
</script>
</body></html>
