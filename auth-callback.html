<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Authenticating…</title></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';

// Handle both hash-based (implicit) and code-based (PKCE) flows
const hash = window.location.hash;
const search = window.location.search;

if (hash && hash.includes('access_token')) {
  // Implicit flow — pass hash to login.html
  window.location.replace('login.html' + hash);
} else if (search && search.includes('code=')) {
  // PKCE flow — let Supabase SDK exchange the code
  const sb = supabase.createClient(SB_URL, ANON_KEY);
  sb.auth.exchangeCodeForSession(window.location.href).then(({ data, error }) => {
    if (error || !data.session) {
      window.location.replace('login.html');
    } else {
      // Pass access token to login.html via hash for unified handling
      window.location.replace('login.html#access_token=' + data.session.access_token + '&refresh_token=' + data.session.refresh_token);
    }
  });
} else {
  window.location.replace('login.html');
}
</script>
</body></html>
