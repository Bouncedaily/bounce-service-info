<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce Service Info - Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1e2330;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:#e63946;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon i{color:#fff;font-size:18px}
.logo-text{font-size:16px;font-weight:700;color:#fff}.logo-text span{color:#e63946}
h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-size:14px;outline:none;transition:border .15s;margin-bottom:16px}
input:focus{border-color:#e63946}input::placeholder{color:#475569}
.pw-wrap{position:relative;margin-bottom:16px}
.pw-wrap input{margin-bottom:0;padding-right:40px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:16px}
.btn{width:100%;padding:12px;background:#e63946;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{background:#c1121f}.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.msg.err{background:#450a0a;border:1px solid #dc2626;color:#fca5a5;display:block}
.msg.ok{background:#052e16;border:1px solid #166534;color:#4ade80;display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.step{display:none}.step.active{display:block}
.back-link{text-align:center;margin-top:12px;font-size:12px}
.back-link a{color:#475569;text-decoration:none;cursor:pointer}.back-link a:hover{color:#94a3b8}
.hint{font-size:11px;color:#475569;margin-top:-10px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-brand-battery"></i></div>
    <div class="logo-text">Bounce <span>Service Info</span></div>
  </div>

  <!-- Step 1: Email -->
  <div class="step active" id="step-email">
    <h2>Welcome</h2>
    <p class="sub">Enter your Bounce work email to continue.</p>
    <div class="msg" id="msg-email"></div>
    <label>Work Email</label>
    <input type="email" id="email" placeholder="you@bounceshare.com" autocomplete="email"/>
    <button class="btn" id="btn-email" onclick="checkEmail()">Continue</button>
  </div>

  <!-- Step 2a: Sign In -->
  <div class="step" id="step-signin">
    <h2>Sign In</h2>
    <p class="sub" id="signin-sub"></p>
    <div class="msg" id="msg-signin"></div>
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
      <button class="pw-toggle" onclick="togglePw('password','pw-icon')"><i class="ti ti-eye" id="pw-icon"></i></button>
    </div>
    <button class="btn" id="btn-signin" onclick="signIn()">Sign In</button>
    <div class="back-link"><a onclick="goBack()">Use a different email</a></div>
  </div>

  <!-- Step 2b: Create Password -->
  <div class="step" id="step-create">
    <h2 id="create-title">Create your password</h2>
    <p class="sub" id="create-sub">Set a password for your account.</p>
    <div class="msg" id="msg-create"></div>
    <label>New Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw-new" placeholder="At least 8 characters"/>
      <button class="pw-toggle" onclick="togglePw('pw-new','icon-new')"><i class="ti ti-eye" id="icon-new"></i></button>
    </div>
    <p class="hint">Min 8 characters</p>
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw-confirm" placeholder="Repeat password"/>
      <button class="pw-toggle" onclick="togglePw('pw-confirm','icon-confirm')"><i class="ti ti-eye" id="icon-confirm"></i></button>
    </div>
    <button class="btn" id="btn-create" onclick="createPassword()">Set Password and Sign In</button>
    <div class="back-link"><a onclick="goBack()">Use a different email</a></div>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('msg-email');
  if (el) { el.textContent = 'JS Error: ' + msg + ' (line ' + line + ')'; el.className = 'msg err'; }
  return false;
};
var SB_URL =  + SB_URL + ;
var SB_KEY =  + SB_KEY + ;
var EDGE   =  + EDGE + ;
var currentEmail = '';

function showStep(id) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function showMsg(step, text, type) {
  var el = document.getElementById('msg-' + step);
  el.textContent = text; el.className = 'msg ' + type;
}
function togglePw(inputId, iconId) {
  var inp = document.getElementById(inputId);
  var ic  = document.getElementById(iconId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ic.className = inp.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
}
function setLoading(btnId, loading, text) {
  var btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' + text : text;
}
function goBack() { showStep('step-email'); }
function saveSession(access, refresh, email) {
  localStorage.setItem('sb_session', JSON.stringify({
    access_token: access, refresh_token: refresh,
    email: email, expires_at: Date.now() + 24 * 60 * 60 * 1000
  }));
}

async function checkEmail() {
  try {
  var email = document.getElementById('email').value.trim().toLowerCase();
  if (!email) return showMsg('email', 'Enter your email.', 'err');
  if (!email.endsWith('@bounceshare.com')) return showMsg('email', 'Only @bounceshare.com emails are allowed.', 'err');
  setLoading('btn-email', true, 'Checking...');
  try {
    // Query allowed_users directly
    var res = await fetch('https://fuslpeyhpmofzijrotkb.supabase.co/rest/v1/allowed_users?email=eq.' + encodeURIComponent(email) + '&select=permissions,role,needs_reset,is_active', {
      headers: {'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs'}
    });
    var rows = await res.json();
    if (!rows || !rows.length || !rows[0].is_active) {
      showMsg('email', 'Your email is not registered. Contact admin.', 'err');
      setLoading('btn-email', false, 'Continue');
      return;
    }
    var user = rows[0];
    currentEmail = email;
    // Try signing in with a blank password to check if user has password set
    // Actually just check if sign-in with wrong password gives invalid_credentials vs user_not_found
    var checkRes = await fetch('https://fuslpeyhpmofzijrotkb.supabase.co/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs', 'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, password: '__check_only__'})
    });
    var checkData = await checkRes.json();
    // invalid_credentials = user exists but wrong password = has password
    // user_not_found OR same = no password set yet
    var hasPassword = (checkData.error_code === 'invalid_credentials');
    if (!hasPassword || user.needs_reset) {
      document.getElementById('create-title').textContent = user.needs_reset ? 'Reset your password' : 'Create your password';
      document.getElementById('create-sub').textContent   = user.needs_reset ? 'Admin reset your password. Set a new one.' : 'Welcome! Set a password for ' + email;
      showStep('step-create');
    } else {
      document.getElementById('signin-sub').textContent = email;
      showStep('step-signin');
    }
  } catch(e) {
    showMsg('email', 'Network error: ' + e.message, 'err');
  }
  setLoading('btn-email', false, 'Continue');
  } catch(fatal) {
    showMsg('email', 'Fatal: ' + fatal.message, 'err');
  }
}

async function signIn() {
  var password = document.getElementById('password').value;
  if (!password) return showMsg('signin', 'Enter your password.', 'err');
  setLoading('btn-signin', true, 'Signing in...');
  try {
    var res  = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'apikey': SB_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email: currentEmail, password: password})
    });
    var data = await res.json();
    if (!res.ok) {
      showMsg('signin', data.error_description || 'Invalid password.', 'err');
      setLoading('btn-signin', false, 'Sign In');
      return;
    }
    saveSession(data.access_token, data.refresh_token, currentEmail);
    window.location.replace('index.html');
  } catch(e) {
    showMsg('signin', 'Network error.', 'err');
    setLoading('btn-signin', false, 'Sign In');
  }
}

async function createPassword() {
  var pw1 = document.getElementById('pw-new').value;
  var pw2 = document.getElementById('pw-confirm').value;
  if (pw1.length < 8) return showMsg('create', 'Password must be at least 8 characters.', 'err');
  if (pw1 !== pw2)    return showMsg('create', 'Passwords do not match.', 'err');
  setLoading('btn-create', true, 'Setting password...');
  try {
    var res  = await fetch(EDGE, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'create_password', email: currentEmail, password: pw1})
    });
    var data = await res.json();
    if (!res.ok || data.error) {
      showMsg('create', data.error || 'Failed to set password.', 'err');
      setLoading('btn-create', false, 'Set Password and Sign In');
      return;
    }
    var signRes = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'apikey': SB_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email: currentEmail, password: pw1})
    });
    var sd = await signRes.json();
    if (!signRes.ok) {
      showMsg('create', 'Password created! Please sign in now.', 'ok');
      setTimeout(function(){ showStep('step-signin'); }, 1500);
      setLoading('btn-create', false, 'Set Password and Sign In');
      return;
    }
    saveSession(sd.access_token, sd.refresh_token, currentEmail);
    window.location.replace('index.html');
  } catch(e) {
    showMsg('create', 'Network error. Try again.', 'err');
    setLoading('btn-create', false, 'Set Password and Sign In');
  }
}

// If already logged in redirect
(function(){
  try {
    var s = JSON.parse(localStorage.getItem('sb_session') || '{}');
    if (s.access_token && s.expires_at > Date.now()) window.location.replace('index.html');
  } catch(e) {}
})();

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var active = document.querySelector('.step.active');
  if (!active) return;
  if (active.id === 'step-email')  checkEmail();
  if (active.id === 'step-signin') signIn();
  if (active.id === 'step-create') createPassword();
});
</script>
</body>
</html>
