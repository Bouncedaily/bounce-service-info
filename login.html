<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <title>Login — Bounce Daily</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
    .logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px}
    .logo-img{width:52px;height:52px;border-radius:14px;object-fit:contain}
    .logo-fallback{width:52px;height:52px;background:#dc2626;border-radius:14px;display:none;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff}
    .logo-text{text-align:left}
    .logo-name{font-size:20px;font-weight:800;color:#0f172a}
    .logo-name span{color:#dc2626}
    .logo-sub{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
    h1{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:8px}
    .sub{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5}
    .badge{display:inline-flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:20px}
    .badge::before{content:'';width:6px;height:6px;background:#16a34a;border-radius:50%}
    input{width:100%;padding:12px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;color:#0f172a;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:14px;text-align:left}
    input:focus{border-color:#dc2626;background:#fff}
    input::placeholder{color:#94a3b8}
    .btn{width:100%;padding:13px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
    .btn:hover:not(:disabled){background:#b91c1c}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .err{color:#dc2626;font-size:12px;margin-top:10px;min-height:18px}
    .sent{display:none}
    .sent .icon{font-size:48px;margin-bottom:12px}
    .sent h3{font-size:18px;font-weight:800;color:#0f172a;margin-bottom:8px}
    .sent p{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
    .resend-btn{background:none;border:none;color:#dc2626;font-size:13px;font-weight:600;cursor:pointer}
    .footer{margin-top:20px;font-size:11px;color:#94a3b8}
    #spin{color:#64748b;padding:20px 0;font-size:13px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <img class="logo-img" src="https://bouncedaily.in/logo  (1).png"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="Bounce">
    <div class="logo-fallback">B</div>
    <div class="logo-text">
      <div class="logo-name">Bounce <span>Daily</span></div>
      <div class="logo-sub">Service Info</div>
    </div>
  </div>

  <div id="spin" style="display:none">Checking session…</div>

  <div id="form" style="display:none">
    <h1>Welcome to Service Info</h1>
    <p class="sub">Enter your work email and we'll send you a one-click sign-in link.</p>
    <div class="badge">@bounceshare.com only</div>
    <input type="email" id="email" placeholder="you@bounceshare.com" autocomplete="email"/>
    <button class="btn" id="btn" onclick="sendLink()">Send Magic Link</button>
    <div class="err" id="err"></div>
  </div>

  <div id="sent" class="sent">
    <div class="icon">📬</div>
    <h3>Check your inbox</h3>
    <p id="sent-txt"></p>
    <button class="resend-btn" onclick="showForm()">← Use different email</button>
  </div>

  <div class="footer">Only authorised Bounce management accounts can access this dashboard.</div>
</div>

<script>
const SB_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';

const sb = supabase.createClient(SB_URL, ANON_KEY, {
  auth: { persistSession: true, storageKey: 'sb_session_v2', autoRefreshToken: true }
});

function showForm() {
  document.getElementById('spin').style.display = 'none';
  document.getElementById('sent').style.display = 'none';
  document.getElementById('form').style.display = 'block';
}

async function sendLink() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.textContent = '';

  if (!email) { err.textContent = 'Please enter your email.'; return; }
  if (!email.endsWith('@bounceshare.com')) { err.textContent = 'Only @bounceshare.com emails are allowed.'; return; }

  btn.disabled = true; btn.textContent = 'Sending…';

  const otpPromise = sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
  const timeoutPromise = new Promise(r => setTimeout(() => r({ error: { message: 'Timed out. Please try again.' } }), 10000));
  const { error } = await Promise.race([otpPromise, timeoutPromise]);

  btn.disabled = false; btn.textContent = 'Send Magic Link';
  if (error) {
    err.textContent = error.message || 'Failed to send. Try again in a few minutes.';
  } else {
    document.getElementById('form').style.display = 'none';
    document.getElementById('sent').style.display = 'block';
    document.getElementById('sent-txt').innerHTML = `Magic link sent to <strong>${email}</strong>.<br><br>Check your inbox and click the link to sign in. It expires in 1 hour.`;
  }
}

// Handle auth state — SDK automatically processes the token from URL hash
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    const email = session.user.email?.toLowerCase();

    // Bug 1 fix: Always validate against allowed_users table
    const { data: userData, error } = await sb
      .from('allowed_users')
      .select('email,role,name,permissions,is_active')
      .eq('email', email)
      .eq('is_active', true)
      .single();

    if (error || !userData) {
      // Not in allowed_users or inactive — sign out and show error
      await sb.auth.signOut();
      showForm();
      document.getElementById('err').textContent = 'Access denied. Your email is not authorised. Contact nithish@bounceshare.com';
      return;
    }

    // Log login
    sb.rpc('log_login_activity', { user_email: email, user_ip: navigator.userAgent.substring(0, 100) }).catch(() => {});

    // Store session with actual permissions from DB
    const sessionData = JSON.stringify({
      access_token: session.access_token,
      refresh_token: session.refresh_token,
      email: session.user.email,
      role: userData.role,
      name: userData.name,
      permissions: userData.permissions || { rmc: true, fleet_km: true, parts_testing: true }
    });
    localStorage.setItem('sb_session', sessionData);
    sessionStorage.setItem('sb_session', sessionData);
    window.location.replace('dashboard.html');
  }
});

// Always show form on login page
document.addEventListener('DOMContentLoaded', async () => {
  showForm(); // Show immediately — no flash
  const hasToken = window.location.hash.includes('access_token') || window.location.search.includes('code=');
  if (!hasToken) {
    try { await sb.auth.signOut(); } catch(e) {}
  }
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') sendLink(); });
});
</script>
</body></html>
