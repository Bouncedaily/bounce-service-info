<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bounce Ops</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      font-size: 28px;
    }

    .logo-name {
      font-size: 22px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }

    .logo-name span {
      color: #f97316;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input[type="email"]:focus {
      border-color: #f97316;
    }

    input[type="email"]::placeholder {
      color: #475569;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:hover:not(:disabled) { background: #ea6c0a; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .msg.success {
      background: #052e16;
      border: 1px solid #16a34a;
      color: #4ade80;
      display: block;
    }

    .msg.error {
      background: #450a0a;
      border: 1px solid #dc2626;
      color: #fca5a5;
      display: block;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🏍️</span>
    <span class="logo-name">Bounce <span>Ops</span></span>
  </div>

  <h1>Management Dashboard</h1>
  <p class="subtitle">Enter your work email and we'll send you a secure login link — no password needed.</p>

  <div id="login-form">
    <label for="email">Work Email</label>
    <input type="email" id="email" placeholder="you@bounceshare.com" autocomplete="email" />
    <button id="send-btn" onclick="sendMagicLink()">Send Login Link</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="footer">Only authorised Bounce management accounts can access this dashboard.</div>
</div>

<script>
  const SB_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';

  // Allowed emails
  const ALLOWED = ['nithish@bounceshare.com', 'vamsee@bounceshare.com'];

  // If already logged in, redirect to dashboard
  async function checkSession() {
    try {
      const stored = localStorage.getItem('sb_session');
      if (!stored) return;
      const session = JSON.parse(stored);
      if (!session?.access_token) return;

      // Verify token is still valid
      const res = await fetch(`${SB_URL}/auth/v1/user`, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${session.access_token}` }
      });
      if (res.ok) {
        window.location.href = 'dashboard.html';
      } else {
        localStorage.removeItem('sb_session');
      }
    } catch(e) {}
  }

  // Handle magic link callback (when user clicks link in email)
  async function handleAuthCallback() {
    const hash = window.location.hash;
    if (!hash.includes('access_token')) return;

    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');

    if (!access_token) return;

    // Get user info
    try {
      const res = await fetch(`${SB_URL}/auth/v1/user`, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${access_token}` }
      });
      const user = await res.json();

      if (!ALLOWED.includes(user.email?.toLowerCase())) {
        showMsg('error', 'Access denied. Your email is not authorised for this dashboard.');
        return;
      }

      // Store session
      localStorage.setItem('sb_session', JSON.stringify({ access_token, refresh_token, email: user.email }));
      // Clean URL and redirect
      window.location.href = 'dashboard.html';
    } catch(e) {
      showMsg('error', 'Authentication failed. Please try again.');
    }
  }

  async function sendMagicLink() {
    const email = document.getElementById('email').value.trim().toLowerCase();
    const btn = document.getElementById('send-btn');
    const msg = document.getElementById('msg');

    if (!email) { showMsg('error', 'Please enter your email address.'); return; }
    if (!ALLOWED.includes(email)) {
      showMsg('error', 'This email is not authorised to access the dashboard.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';
    msg.className = 'msg';
    msg.style.display = 'none';

    try {
      const res = await fetch(`${SB_URL}/auth/v1/magiclink`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, redirect_to: `${window.location.origin}/login.html` })
      });

      if (res.ok || res.status === 200) {
        showMsg('success', `✅ Login link sent to ${email}. Check your inbox and click the link to access the dashboard.`);
        btn.textContent = 'Resend Link';
      } else {
        const err = await res.json();
        throw new Error(err.error_description || err.msg || 'Failed to send link');
      }
    } catch(e) {
      showMsg('error', e.message || 'Something went wrong. Please try again.');
      btn.textContent = 'Send Login Link';
    }

    btn.disabled = false;
  }

  function showMsg(type, text) {
    const msg = document.getElementById('msg');
    msg.className = `msg ${type}`;
    msg.textContent = text;
    msg.style.display = 'block';
  }

  // Enter key support
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMagicLink();
    });
    handleAuthCallback();
    checkSession();
  });
</script>

</body>
</html>
