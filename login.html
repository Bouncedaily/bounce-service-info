<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce Service Info — Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1e2330;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 36px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:#e63946;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon i{color:#fff;font-size:18px}
.logo-text{font-size:16px;font-weight:700;color:#fff}.logo-text span{color:#e63946}
h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-size:14px;outline:none;transition:border .15s;margin-bottom:16px}
input:focus{border-color:#e63946}
input::placeholder{color:#475569}
.pw-wrap{position:relative;margin-bottom:16px}
.pw-wrap input{margin-bottom:0}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:4px}
.pw-toggle:hover{color:#94a3b8}
.btn{width:100%;padding:12px;background:#e63946;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:#c1121f}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.msg.err{background:#450a0a;border:1px solid #dc2626;color:#fca5a5;display:block}
.msg.ok{background:#052e16;border:1px solid #166534;color:#4ade80;display:block}
.forgot{text-align:center;margin-top:16px}
.forgot a{font-size:12px;color:#475569;text-decoration:none}
.forgot a:hover{color:#94a3b8}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-brand-battery"></i></div>
    <div class="logo-text">Bounce <span>Service Info</span></div>
  </div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in with your Bounce work account</p>
  <div class="msg" id="msg"></div>
  <label>Work Email</label>
  <input type="email" id="email" placeholder="you@bounceshare.com" autocomplete="email"/>
  <label>Password</label>
  <div class="pw-wrap">
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
    <button class="pw-toggle" type="button" onclick="togglePw()" id="pw-btn"><i class="ti ti-eye" id="pw-icon"></i></button>
  </div>
  <button class="btn" id="btn" onclick="signIn()">Sign In</button>
  <div class="forgot"><a href="forgot.html">Forgot password?</a></div>
</div>

<script>
const SB_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';

function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('pw-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn');

  if (!email) return showMsg('Please enter your email.', 'err');
  if (!email.endsWith('@bounceshare.com')) return showMsg('Only @bounceshare.com emails are allowed.', 'err');
  if (!password) return showMsg('Please enter your password.', 'err');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.error_description || data.msg || 'Invalid email or password.', 'err');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    // Store session with 1-day expiry
    const session = {
      access_token:  data.access_token,
      refresh_token: data.refresh_token,
      email:         data.user?.email,
      expires_at:    Date.now() + 24 * 60 * 60 * 1000
    };
    localStorage.setItem('sb_session', JSON.stringify(session));
    window.location.replace('index.html');
  } catch(e) {
    showMsg('Network error. Please try again.', 'err');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Check if already logged in
(function() {
  try {
    const sess = JSON.parse(localStorage.getItem('sb_session') || '{}');
    if (sess.access_token && sess.expires_at > Date.now()) {
      window.location.replace('index.html');
    }
  } catch(e) {}
})();

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
</body>
</html>
