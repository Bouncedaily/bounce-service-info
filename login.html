<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce Service Info - Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1e2330;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:#e63946;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon i{color:#fff;font-size:18px}
.logo-text{font-size:16px;font-weight:700;color:#fff}
.logo-text span{color:#e63946}
h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-size:14px;outline:none;transition:border .15s;margin-bottom:16px}
input:focus{border-color:#e63946}
input::placeholder{color:#475569}
.pw-wrap{position:relative;margin-bottom:16px}
.pw-wrap input{margin-bottom:0;padding-right:40px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:16px}
.btn{width:100%;padding:12px;background:#e63946;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{background:#c1121f}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.msg.err{background:#450a0a;border:1px solid #dc2626;color:#fca5a5;display:block}
.msg.ok{background:#052e16;border:1px solid #166534;color:#4ade80;display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.step{display:none}
.step.active{display:block}
.back-link{text-align:center;margin-top:12px;font-size:12px}
.back-link a{color:#475569;text-decoration:none;cursor:pointer}
.hint{font-size:11px;color:#475569;margin-top:-10px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg></div>
    <div class="logo-text">Bounce <span>Service Info</span></div>
  </div>

  <div class="step active" id="step-email">
    <h2>Welcome</h2>
    <p class="sub">Enter your Bounce work email to continue.</p>
    <div class="msg" id="msg-email"></div>
    <label>Work Email</label>
    <input type="email" id="email" placeholder="you@bounceshare.com" autocomplete="email"/>
    <button class="btn" id="btn-email" onclick="checkEmail()">Continue</button>
  </div>

  <div class="step" id="step-signin">
    <h2>Sign In</h2>
    <p class="sub" id="signin-sub"></p>
    <div class="msg" id="msg-signin"></div>
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
      <button class="pw-toggle" onclick="togglePw('password','pw-icon')"><i class="ti ti-eye" id="pw-icon"></i></button>
    </div>
    <button class="btn" id="btn-signin" onclick="doSignIn()">Sign In</button>
    <div class="back-link"><a onclick="goBack()">Use a different email</a></div>
  </div>

  <div class="step" id="step-create">
    <h2 id="create-title">Create your password</h2>
    <p class="sub" id="create-sub">Set a password for your account.</p>
    <div class="msg" id="msg-create"></div>
    <label>New Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw-new" placeholder="At least 8 characters"/>
      <button class="pw-toggle" onclick="togglePw('pw-new','icon-new')"><i class="ti ti-eye" id="icon-new"></i></button>
    </div>
    <p class="hint">Min 8 characters</p>
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw-confirm" placeholder="Repeat password"/>
      <button class="pw-toggle" onclick="togglePw('pw-confirm','icon-confirm')"><i class="ti ti-eye" id="icon-confirm"></i></button>
    </div>
    <button class="btn" id="btn-create" onclick="createPassword()">Set Password and Sign In</button>
    <div class="back-link"><a onclick="goBack()">Use a different email</a></div>
  </div>
</div>

<script>
var SB  = 'https://fuslpeyhpmofzijrotkb.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';
var EFN = 'https://fuslpeyhpmofzijrotkb.supabase.co/functions/v1/auth-user';
var currentEmail = '';

function showStep(id) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function showMsg(step, text, type) {
  var el = document.getElementById('msg-' + step);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function togglePw(inp, icon) {
  var i = document.getElementById(inp);
  var ic = document.getElementById(icon);
  i.type = i.type === 'password' ? 'text' : 'password';
  ic.className = i.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
}
function setBusy(id, busy, label) {
  var b = document.getElementById(id);
  b.disabled = busy;
  b.innerHTML = busy ? '<span class="spinner"></span>' + label : label;
}
function goBack() { showStep('step-email'); }
function logLogin(email) {
  fetch(EFN, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'log_login', email: email, user_agent: navigator.userAgent })
  }).catch(function() {}); // fire and forget
}

function saveSession(tok, ref, em) {
  logLogin(em); // log activity
  // Fetch role from allowed_users and store with session
  fetch(SB + '/rest/v1/allowed_users?email=eq.' + encodeURIComponent(em) + '&select=role,permissions', {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(rows) {
    var role = rows && rows[0] ? rows[0].role : 'viewer';
    var perms = rows && rows[0] ? rows[0].permissions : {};
    localStorage.setItem('sb_session', JSON.stringify({
      access_token: tok, refresh_token: ref,
      email: em, role: role, permissions: perms,
      expires_at: Date.now() + 86400000
    }));
    window.location.replace('index.html');
  })
  .catch(function() {
    localStorage.setItem('sb_session', JSON.stringify({
      access_token: tok, refresh_token: ref,
      email: em, role: 'viewer', permissions: {},
      expires_at: Date.now() + 86400000
    }));
    window.location.replace('index.html');
  });
}

function checkEmail() {
  var email = document.getElementById('email').value.trim().toLowerCase();
  if (!email) { showMsg('email', 'Enter your email.', 'err'); return; }
  if (email.indexOf('@bounceshare.com') === -1) { showMsg('email', 'Only @bounceshare.com emails allowed.', 'err'); return; }
  setBusy('btn-email', true, 'Checking...');
  currentEmail = email;
  // Use Edge Function to check if user has password set
  fetch('https://fuslpeyhpmofzijrotkb.supabase.co/functions/v1/auth-user', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'check', email: email })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    setBusy('btn-email', false, 'Continue');
    // d.has_password = true means user exists in Supabase auth with a password
    if (d.has_password && !d.needs_reset) {
      document.getElementById('signin-sub').textContent = email;
      showStep('step-signin');
    } else {
      document.getElementById('create-title').textContent = d.needs_reset ? 'Reset your password' : 'Create your password';
      document.getElementById('create-sub').textContent   = d.needs_reset ? 'Admin reset your password. Set a new one.' : 'Set a password for ' + email;
      showStep('step-create');
    }
  })
  .catch(function(e) {
    showMsg('email', 'Error: ' + e.message, 'err');
    setBusy('btn-email', false, 'Continue');
  });
}

function doSignIn() {
  var pw = document.getElementById('password').value;
  if (!pw) { showMsg('signin', 'Enter your password.', 'err'); return; }
  setBusy('btn-signin', true, 'Signing in...');
  fetch(SB + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: currentEmail, password: pw })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error || !d.access_token) {
      showMsg('signin', d.error_description || 'Invalid password.', 'err');
      setBusy('btn-signin', false, 'Sign In');
      return;
    }
    saveSession(d.access_token, d.refresh_token, currentEmail);
  })
  .catch(function(e) {
    showMsg('signin', 'Error: ' + e.message, 'err');
    setBusy('btn-signin', false, 'Sign In');
  });
}

function createPassword() {
  var pw1 = document.getElementById('pw-new').value;
  var pw2 = document.getElementById('pw-confirm').value;
  if (pw1.length < 8) { showMsg('create', 'Password must be at least 8 characters.', 'err'); return; }
  if (pw1 !== pw2) { showMsg('create', 'Passwords do not match.', 'err'); return; }
  setBusy('btn-create', true, 'Setting password...');
  fetch(EFN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'create_password', email: currentEmail, password: pw1 })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) { showMsg('create', d.error, 'err'); setBusy('btn-create', false, 'Set Password and Sign In'); return; }
    return fetch(SB + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentEmail, password: pw1 })
    })
    .then(function(r) { return r.json(); })
    .then(function(sd) {
      if (!sd.access_token) {
        showMsg('create', 'Password created! Please sign in.', 'ok');
        setTimeout(function() { showStep('step-signin'); }, 1500);
        setBusy('btn-create', false, 'Set Password and Sign In');
        return;
      }
      saveSession(sd.access_token, sd.refresh_token, currentEmail);
    });
  })
  .catch(function(e) {
    showMsg('create', 'Error: ' + e.message, 'err');
    setBusy('btn-create', false, 'Set Password and Sign In');
  });
}

(function() {
  try {
    var s = JSON.parse(localStorage.getItem('sb_session') || '{}');
    if (s.access_token && s.expires_at > Date.now()) { window.location.replace('index.html'); }
  } catch(e) {}
})();

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var a = document.querySelector('.step.active');
  if (!a) return;
  if (a.id === 'step-email')  checkEmail();
  if (a.id === 'step-signin') doSignIn();
  if (a.id === 'step-create') createPassword();
});
</script>
</body>
</html>
