<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hub Control Tower — Bounce Service Info</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <link rel="stylesheet" href="bounce-theme.css?v=1780722254"/>
  <script src="auth-guard.js?v=1780722254"></script>
  <style>
    .wrap { padding: 24px; }
    .page-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .page-sub { font-size: 12px; color: var(--muted); margin-top: 2px; margin-bottom: 20px; }

    .ctl-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; }
    .fg select {
      padding: 7px 10px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12px; outline: none; min-width: 190px;
    }
    .fg select:focus { border-color: var(--red); }

    .live-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-left: auto; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); animation: livepulse 2s infinite; }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .countdown { color: #22c55e; font-weight: 700; font-variant-numeric: tabular-nums; }
    .btn-refresh {
      padding: 7px 13px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer;
      font-family: inherit; transition: color .15s, border-color .15s;
    }
    .btn-refresh:hover { color: var(--text); border-color: var(--text); }

    /* ── KPI grid ── */
    .kpi-row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 20px; }
    @media(max-width:1100px) { .kpi-row { grid-template-columns: repeat(3,1fr); } }
    @media(max-width:640px)  { .kpi-row { grid-template-columns: repeat(2,1fr); } }

    .kpi {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 12px;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      height: 140px; box-sizing: border-box;
    }
    .kpi .kl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi .kv { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; margin-bottom: 4px; }
    .kpi .ks { font-size: 11px; color: var(--muted); flex: 1; }
    .kpi .kbar { height: 2px; border-radius: 2px; margin-top: 10px; background: var(--border); flex-shrink: 0; }

    /* section label */
    .sec-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

    /* bottom grid */
    .bottom-grid { display: grid; grid-template-columns: 1fr 2.2fr; gap: 16px; }
    @media(max-width:960px) { .bottom-grid { grid-template-columns: 1fr; } }

    /* health scorecards */
    .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hcard { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .hcard .hl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
    .hcard .hv { font-size: 24px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 2px; }
    .hcard .hv span { font-size: 13px; font-weight: 400; color: var(--muted); }
    .hcard .ht { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .hstatus { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sd-g { background: #22c55e; } .hs-g { color: #4ade80; }
    .sd-a { background: #f59e0b; } .hs-a { color: #fbbf24; }
    .sd-r { background: #ef4444; } .hs-r { color: #f87171; }

    /* aging panel */
    .aging-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .aging-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .aging-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .aging-total { font-size: 11px; color: var(--muted); }

    .aging-buckets { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 14px; }
    @media(max-width:700px) { .aging-buckets { grid-template-columns: repeat(3,1fr); } }

    .ab { border-radius: 10px; padding: 12px 10px; text-align: center; border: 1px solid transparent; }
    .ab0 { background: rgba(34,197,94,.08);  border-color: rgba(34,197,94,.25); }
    .ab1 { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.25); }
    .ab2 { background: rgba(249,115,22,.08); border-color: rgba(249,115,22,.3); }
    .ab3 { background: rgba(239,68,68,.1);   border-color: rgba(239,68,68,.3); }
    .ab4 { background: rgba(220,38,38,.15);  border-color: rgba(220,38,38,.5); }

    .ab-range { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; }
    .ab0 .ab-range{color:#4ade80} .ab1 .ab-range{color:#fbbf24} .ab2 .ab-range{color:#fb923c} .ab3 .ab-range{color:#f87171} .ab4 .ab-range{color:#fca5a5}

    .ab-count { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
    .ab0 .ab-count{color:#4ade80} .ab1 .ab-count{color:#fbbf24} .ab2 .ab-count{color:#fb923c} .ab3 .ab-count{color:#f87171} .ab4 .ab-count{color:#fca5a5}

    .ab-pct { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .ab-pill { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
    .ab0 .ab-pill{background:rgba(34,197,94,.15);color:#4ade80} .ab1 .ab-pill{background:rgba(245,158,11,.15);color:#fbbf24}
    .ab2 .ab-pill{background:rgba(249,115,22,.15);color:#fb923c} .ab3 .ab-pill{background:rgba(239,68,68,.15);color:#f87171}
    .ab4 .ab-pill{background:rgba(220,38,38,.2);color:#fca5a5}

    .bar-lbl { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .bar-track { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; display: flex; }
    .bs { height: 100%; transition: width .5s ease; }
    .bs0{background:#22c55e} .bs1{background:#f59e0b} .bs2{background:#f97316} .bs3{background:#ef4444} .bs4{background:#dc2626}

    .bar-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
    .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .crit-banner {
      margin-top: 12px; background: rgba(239,68,68,.07);
      border: 1px solid rgba(239,68,68,.3); border-radius: 8px;
      padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px;
    }
    .crit-icon { font-size: 14px; color: #ef4444; flex-shrink: 0; margin-top: 1px; }
    .crit-text { font-size: 11px; color: #fca5a5; line-height: 1.6; }
    .crit-text strong { color: #f87171; font-weight: 700; }

    .loading-state { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-upd { font-size: 11px; color: var(--muted); margin-top: 16px; text-align: right; }
    .na-tag { display: inline-block; font-size: 10px; color: var(--muted); background: var(--bg); border: 1px dashed var(--border); padding: 1px 7px; border-radius: 4px; }

    /* runway */
    .runway-section { margin-top: 16px; }
    .runway-grid { display: grid; gap: 10px; }
    .runway-card { min-width: 0; }
    .runway-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .runway-card .rl { font-size: 10px; text-transform: uppercase; letter-spacing:.06em; color: var(--muted); font-weight:600; margin-bottom:6px; }
    .runway-card .rv { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; line-height:1; margin-bottom:3px; }
    .runway-card .rs { font-size: 11px; color: var(--muted); margin-bottom:6px; }
    .runway-card .rbar { height:3px; border-radius:2px; margin-top:10px; }
    .runway-good  .rv { color: var(--text); }
    .runway-warn  .rv { color: #f59e0b; }
    .runway-crit  .rv { color: #ef4444; }
    .runway-good  .rbar { background: #22c55e; }
    .runway-warn  .rbar { background: #f59e0b; }
    .runway-crit  .rbar { background: #ef4444; }
    .runway-synced { display: none; }

    /* inflow breakdown */
    .inflow-section { margin-bottom: 20px; }
    .inflow-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; align-items: center; gap: 0; overflow: hidden;
    }
    .inflow-item {
      flex: 1; text-align: center; padding: 8px 12px;
      border-right: 1px solid var(--border); min-width: 0;
    }
    .inflow-item:last-child { border-right: none; }
    .inflow-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inflow-count { font-size: 28px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px; }
    .inflow-pct { font-size: 11px; color: var(--muted); }
    .inflow-bar-wrap { height: 4px; background: var(--bg); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .inflow-bar-fill { height: 100%; border-radius: 2px; }
    .inflow-total-label { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; padding-left: 16px; flex-shrink: 0; }
  </style>
</head>

<script>
const INFO_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
const INFO_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';
const SF_URL   = 'https://jpypnrrjiagscqrucslw.supabase.co';
const SF_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpweXBucnJqaWFnc2NxcnVjc2x3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDU2NDAsImV4cCI6MjA5NDkyMTY0MH0.fesCaEsgS7r4Z6mV5S1-z54etaGNPpYlISdjjcnLfzM';



let currentHub = '', refreshTimer = null, countdownSec = 300;

function startCountdown() {
  countdownSec = 300;
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    countdownSec--;
    const m = Math.floor(countdownSec / 60), s = countdownSec % 60;
    document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2,'0');
    if (countdownSec <= 0) fetchAll();
  }, 1000);
}

// City → hubs mapping
const CITY_HUBS = {
  'Bangalore': ['Banaswadi','Bellandur','Bilekahalli','Hebbal','Hoodi','HSR Layout','Indiqube Alpha','JP Nagar','Majestic Railway Station','RR Nagar','Spaceware Hub','Yelahanka','Yeshwanthpur','Zolo Triloha'],
  'Hyderabad': ['Fathe nagar','Miyapur'],
  'NCR':       ['Gurugram','Indirapuram','Indirapuram 2','Okhla','Rohini','Saket']
};

function onCityChange() {
  var city = document.getElementById('citySelect').value;
  var hubSel = document.getElementById('hubSelect');
  // Filter hub dropdown to show only hubs in selected city
  Array.from(hubSel.options).forEach(function(opt) {
    if (!opt.value) { opt.style.display = ''; return; }
    if (!city) { opt.style.display = ''; return; }
    opt.style.display = (CITY_HUBS[city] && CITY_HUBS[city].includes(opt.value)) ? '' : 'none';
  });
  // Reset hub — city view takes over
  hubSel.value = '';
  currentHub = '';
  fetchAll(city || null);
}

function onHubChange() {
  currentHub = document.getElementById('hubSelect').value;
  if (currentHub) {
    // Don't clear city — keep the filter visible but load hub-specific data
    fetchAll(null);
  }
}

// Auto-load all hubs on page load
// Auto-load on page open — script at end of body so DOM is ready
document.addEventListener('DOMContentLoaded', function() { try { fetchAll(null); } catch(e) { console.error('fetchAll error:', e); } });

async function sbGet(base, key, table, qs) {
  const r = await fetch(base + '/rest/v1/' + table + '?' + qs, {
    headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
  });
  if (!r.ok) throw new Error(table + ' ' + r.status);
  return r.json();
}



async function fetchAll(city) {
  city = city || null;
  document.getElementById('dashContent').innerHTML =
    '<div class="loading-state"><div class="spin"></div>Loading live data…</div>';
  startCountdown();

  try {
    // Use IST date (UTC+5:30) — Metabase data uses IST
    const nowIST = new Date(new Date().getTime() + (5.5 * 60 * 60 * 1000));
    const today  = nowIST.toISOString().slice(0,10);
    const hub   = encodeURIComponent(currentHub);

    // Build filter based on city or hub selection
    var hubFilter;
    var displayName;
    if (city) {
      var cityHubs = CITY_HUBS[city] || [];
      displayName = city;
      hubFilter = 'hub_name=in.(' + cityHubs.map(function(h){ return encodeURIComponent(h); }).join(',') + ')';
    } else if (currentHub) {
      displayName = currentHub;
      hubFilter = 'hub_name=eq.' + hub;
    } else {
      displayName = 'All Hubs';
      hubFilter = 'hub_name=not.is.null';
    }

    const [fleet, totalFleet, closed, techs, inflow, outflow, rfdStock, runway, msl] = await Promise.all([
      sbGet(INFO_URL, INFO_KEY, 'bike_fleet',
        'select=status,oos_aging_bucket&' + hubFilter + '&status=eq.OOS').catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'bike_fleet',
        'select=status&' + hubFilter).catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'jc_details',
        'select=draft_jc_id&' + hubFilter + '&end_time=gte.' + today + 'T00:00:00&end_time=lte.' + today + 'T23:59:59').catch(() => []),
      sbGet(SF_URL, SF_KEY, 'attendance',
        'select=status&' + hubFilter + '&date=eq.' + today + '&status=in.(present,checked_in,half_day)').catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'inflow_today',
        'select=submission_type,hub_name&' + hubFilter).catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'outflow_today',
        'select=submission_type,hub_name,oos_to_rfd_tat_days&' + hubFilter).catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'bike_fleet',
        'select=status&' + hubFilter + '&status=eq.RFD').catch(() => []),
      sbGet(SF_URL, SF_KEY, 'runway',
        'select=bike_model_name,current_rfd,projected_deployment,runway_days,synced_at&' + hubFilter + '&order=bike_model_name.asc').catch(() => []),
      sbGet(INFO_URL, INFO_KEY, 'hub_msl',
        'select=status&' + hubFilter).catch(() => [])
    ]);

    // Aging
    const BUCKETS = ['0 days','1-2 days','3-4 days','5-7 days','above 7 days'];
    const ages = Object.fromEntries(BUCKETS.map(b => [b,0]));
    fleet.forEach(r => { if (ages.hasOwnProperty(r.oos_aging_bucket)) ages[r.oos_aging_bucket]++; });

    // OOS %
    const oosPercent = totalFleet.length > 0 ? ((fleet.length / totalFleet.length) * 100).toFixed(1) : null;

    // Jobs closed — unique draft_jc_id
    const closedCount = new Set(closed.map(r => r.draft_jc_id).filter(Boolean)).size;

    // Outflow — already filtered by hub in query
    const hubOutflow = outflow;
    const oosRfd = hubOutflow.filter(r => (r.submission_type || '').toUpperCase() === 'OOS').length;
    const pdiRfd = hubOutflow.filter(r => (r.submission_type || '').toUpperCase() === 'PDI').length;
    const totalRfd = hubOutflow.length;

    // Avg TAT — only OOS rows with valid tat
    const tatVals = hubOutflow
      .map(r => parseFloat(r.oos_to_rfd_tat_days || ''))
      .filter(v => !isNaN(v) && v >= 0);
    const avgTat = tatVals.length > 0 ? (tatVals.reduce((a,b) => a+b, 0) / tatVals.length).toFixed(1) : null;

    // null = no MSL data for this hub → hide card entirely
    const mslData = msl || [];
    const mslShorts = mslData.length === 0
      ? null  // no data for this hub — hide card
      : mslData.filter(function(r){ return r.status && r.status.toLowerCase().includes('short'); }).length;
    render({ hub: displayName, total: (fleet||[]).length, ages, closedCount, techs: (techs||[]).length, oosPercent, inflow: (inflow||[]), totalRfd, oosRfd, pdiRfd, avgTat, runway: (runway||[]), rfdStock: (rfdStock||[]).length, mslShorts });

    document.getElementById('lastUpd').textContent =
      'Last refreshed: ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});

  } catch(err) {
    document.getElementById('dashContent').innerHTML =
      '<div class="loading-state" style="color:#f87171"><i class="ti ti-alert-triangle" style="font-size:22px;margin-bottom:8px;display:block"></i>Error loading data: ' + err.message + '</div>';
  }
}

const pct = (n, t) => t > 0 ? Math.round(n/t*100) : 0;

function hs(ok, warn) {
  if (ok)   return { dot:'sd-g', cls:'hs-g', lbl:'Healthy' };
  if (warn) return { dot:'sd-a', cls:'hs-a', lbl:'Attention' };
  return       { dot:'sd-r', cls:'hs-r', lbl:'Critical' };
}

function renderInflowBreakdown(inflow) {
  var types = ['Running Repair', 'Rider Submission', 'Recovery', 'Bike Exchange'];
  var colors = { 'Running Repair': '#3b82f6', 'Rider Submission': '#8b5cf6', 'Recovery': '#f59e0b', 'Bike Exchange': '#22c55e' };
  var counts = {};
  var total = inflow.length;
  types.forEach(function(t) { counts[t] = 0; });
  inflow.forEach(function(r) {
    var st = r.submission_type || '';
    if (counts.hasOwnProperty(st)) counts[st]++;
    else counts['Other'] = (counts['Other'] || 0) + 1;
  });
  // add Other if present
  if (counts['Other']) { types.push('Other'); colors['Other'] = '#6b7f96'; }

  var items = types.filter(function(t) { return counts[t] > 0 || t !== 'Other'; }).map(function(t) {
    var c = counts[t] || 0;
    var pct = total > 0 ? Math.round(c / total * 100) : 0;
    var color = colors[t] || '#6b7f96';
    var shortLabel = t === 'Running Repair' ? 'Running Repair' :
                     t === 'Rider Submission' ? 'Rider Sub.' :
                     t === 'Bike Exchange' ? 'Bike Exchange' : t;
    return '<div class="inflow-item">' +
      '<div class="inflow-label">' + shortLabel + '</div>' +
      '<div class="inflow-count">' + c + '</div>' +
      '<div class="inflow-pct">' + pct + '% of inflow</div>' +
      '<div class="inflow-bar-wrap"><div class="inflow-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '</div>';
  });
  return items.join('');
}

// ── SIDEBAR CONTROL ──────────────────────────────────────
(function() {
  function getSidebar()  { return document.getElementById('sidebar'); }
  function getArrow()    { return document.getElementById('sb-arrow'); }
  function getOpenBtn()  { return document.getElementById('sb-open-btn'); }
  function getHamburger(){ return document.getElementById('sb-hamburger'); }
  function getOverlay()  { return document.getElementById('sb-overlay'); }

  function setSidebarOpen(open) {
    var sb = getSidebar(), arr = getArrow(), btn = getOpenBtn();
    if (!sb) return;
    if (open) {
      sb.classList.remove('collapsed');
      if (arr) arr.className = 'ti ti-chevrons-left';
      if (btn) btn.style.display = 'none';
    } else {
      sb.classList.add('collapsed');
      if (arr) arr.className = 'ti ti-chevrons-right';
      if (btn) btn.style.display = 'flex';
    }
    localStorage.setItem('sb_collapsed', open ? '0' : '1');
  }

  window.toggleSidebar = function() {
    var sb = getSidebar();
    if (!sb) return;
    setSidebarOpen(sb.classList.contains('collapsed'));
  };

  window.openSidebar = function() {
    var sb = getSidebar(), ov = getOverlay(), hb = getHamburger();
    if (!sb) return;
    sb.classList.add('mobile-open');
    if (ov) { ov.style.display = 'block'; ov.classList.add('active'); }
    if (hb) { hb.style.display = 'none'; hb.setAttribute('aria-expanded','true'); }
  };

  window.closeSidebar = function() {
    var sb = getSidebar(), ov = getOverlay(), hb = getHamburger();
    if (!sb) return;
    sb.classList.remove('mobile-open');
    if (ov) { ov.style.display = 'none'; ov.classList.remove('active'); }
    if (hb) { hb.style.display = ''; hb.setAttribute('aria-expanded','false'); }
  };

  // Restore state on load
  var stored = localStorage.getItem('sb_collapsed');
  // Default collapsed (1) unless user explicitly opened (0)
  var shouldBeOpen = (stored === '0');
  setSidebarOpen(shouldBeOpen);
})();
// ─────────────────────────────────────────────────────────
