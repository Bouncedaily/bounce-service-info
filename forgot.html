<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — Bounce Service Info</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1e2330;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 36px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:#e63946;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon i{color:#fff;font-size:18px}
h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-size:14px;outline:none;margin-bottom:16px}
input:focus{border-color:#e63946}
.btn{width:100%;padding:12px;background:#e63946;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.msg.err{background:#450a0a;border:1px solid #dc2626;color:#fca5a5;display:block}
.msg.ok{background:#052e16;border:1px solid #166534;color:#4ade80;display:block}
.back{text-align:center;margin-top:16px;font-size:12px;color:#475569}
.back a{color:#64748b;text-decoration:none}
.back a:hover{color:#94a3b8}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-brand-battery"></i></div>
    <div style="font-size:16px;font-weight:700;color:#fff">Bounce <span style="color:#e63946">Service Info</span></div>
  </div>
  <h2>Reset password</h2>
  <p class="sub">Enter your work email and we'll send a reset link.</p>
  <div class="msg" id="msg"></div>
  <label>Work Email</label>
  <input type="email" id="email" placeholder="you@bounceshare.com"/>
  <button class="btn" id="btn" onclick="resetPw()">Send Reset Link</button>
  <div class="back"><a href="login.html">← Back to sign in</a></div>
</div>
<script>
const SB_URL = 'https://fuslpeyhpmofzijrotkb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1c2xwZXlocG1vZnppanJvdGtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDg0NDgsImV4cCI6MjA5NDMyNDQ0OH0.IGtWV-bus0Tc1i3z7hWuFZEda06q8L31YyBgiOFujbs';

async function resetPw() {
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('btn');
  if (!email) return showMsg('Enter your email.', 'err');
  if (!email.endsWith('@bounceshare.com')) return showMsg('Only @bounceshare.com emails allowed.', 'err');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const res = await fetch(`${SB_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, redirect_to: 'https://bouncedaily.github.io/bounce-service-info/auth-callback.html' })
    });
    showMsg('Reset link sent! Check your inbox.', 'ok');
  } catch(e) {
    showMsg('Failed to send. Try again.', 'err');
  }
  btn.disabled = false;
  btn.textContent = 'Send Reset Link';
}
function showMsg(t,c){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+c;}
document.addEventListener('keydown',e=>{if(e.key==='Enter')resetPw();});
</script>
</body>
</html>
