<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Bounce Service Info</title></head>
<body>
<script>
  try {
    const s = JSON.parse(localStorage.getItem('sb_session') || 'null');
    if (s?.email && s?.access_token && (!s.expires_at || Date.now() < s.expires_at)) {
      window.location.replace('dashboard.html');
    } else {
      window.location.replace('login.html');
    }
  } catch(e) {
    window.location.replace('login.html');
  }
</script>
</body></html>
