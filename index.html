<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bounce Service Info</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; display: flex; }

/* ── SIDEBAR ── */
.sidebar {
  width: 200px; min-width: 200px;
  background: #0f1117;
  display: flex; flex-direction: column;
  height: 100vh;
  transition: width .2s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 52px; min-width: 52px; }

.sb-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,.08);
  min-height: 52px;
}
.sb-logo { width: 28px; height: 28px; border-radius: 6px; background: #e63946; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sb-logo i { color:#fff; font-size:16px; }
.sb-name { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; }
.sb-name span { color: #e63946; }

.sb-sec {
  font-size: 10px; font-weight: 700; letter-spacing: .8px;
  color: #475569; text-transform: uppercase;
  padding: 14px 14px 4px; white-space: nowrap; overflow: hidden;
}

.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; cursor: pointer;
  color: #94a3b8; text-decoration: none;
  font-size: 13px; font-weight: 500;
  border-left: 3px solid transparent;
  transition: all .15s; white-space: nowrap; overflow: hidden;
}
.sb-item:hover { background: rgba(255,255,255,.05); color: #e2e8f0; }
.sb-item.active { background: rgba(230,57,70,.1); color: #fff; border-left-color: #e63946; }
.sb-icon { font-size: 16px; flex-shrink: 0; width: 18px; text-align: center; }
.sb-label { overflow: hidden; text-overflow: ellipsis; }

.sb-toggle {
  position: absolute; bottom: 60px; left: 0;
  width: 100%; padding: 8px 14px;
  background: none; border: none; border-top: 1px solid rgba(255,255,255,.08);
  color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-size: 12px;
}
.sb-toggle:hover { color: #94a3b8; }

.sb-spacer { flex: 1; }

.sb-foot {
  padding: 10px 14px;
  font-size: 10px; color: #475569;
  border-top: 1px solid rgba(255,255,255,.08);
  white-space: nowrap; overflow: hidden;
}

/* ── MAIN ── */
.main {
  flex: 1; display: flex; flex-direction: column;
  height: 100vh; overflow: hidden; position: relative;
}

iframe { display: none; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -200px; top: 0; z-index: 1000; transition: left .2s; height: 100vh; width: 200px !important; }
  .sidebar.mobile-open { left: 0; }
  .sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; }
  .sb-overlay.active { display: block; }
  .sb-hamburger { display: flex !important; }
}
.sb-hamburger {
  display: none; position: fixed; top: 10px; left: 10px; z-index: 998;
  width: 38px; height: 38px; border-radius: 8px;
  background: #0f1117; border: 1px solid rgba(255,255,255,.1);
  color: #fff; font-size: 18px; cursor: pointer;
  align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<button class="sb-hamburger" id="sb-hamburger" onclick="openSidebar()">☰</button>

<nav class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo"><i class="ti ti-brand-battery"></i></div>
    <div class="sb-name">Bounce <span>Service Info</span></div>
  </div>
  <div class="sb-sec">Analytics</div>
  <a class="sb-item active" href="#" data-tab="dashboard" data-src="dashboard.html" onclick="switchTab('dashboard');return false;">
    <i class="ti ti-chart-bar sb-icon"></i><span class="sb-label">RMC Dashboard</span>
  </a>
  <a class="sb-item" href="#" data-tab="fleet" data-src="fleet-km.html" onclick="switchTab('fleet');return false;">
    <i class="ti ti-motorbike sb-icon"></i><span class="sb-label">Fleet KM Analysis</span>
  </a>
  <a class="sb-item" href="#" data-tab="parts" data-src="parts-testing.html" onclick="switchTab('parts');return false;">
    <i class="ti ti-test-pipe sb-icon"></i><span class="sb-label">Parts Testing</span>
  </a>
  <a class="sb-item" href="#" data-tab="tyre" data-src="tyre-analysis.html" onclick="switchTab('tyre');return false;">
    <i class="ti ti-chart-dots sb-icon"></i><span class="sb-label">Wear & Tear Deep Dive</span>
  </a>
  <a class="sb-item" href="#" data-tab="hub" data-src="hub-control-tower.html" onclick="switchTab('hub');return false;">
    <i class="ti ti-dashboard sb-icon"></i><span class="sb-label">Hub Control Tower</span>
  </a>
  <a class="sb-item" href="#" data-tab="msl" data-src="msl-dashboard.html" onclick="switchTab('msl');return false;">
    <i class="ti ti-package sb-icon"></i><span class="sb-label">MSL Dashboard</span>
  </a>
  <div id="admin-link" style="display:none">
    <div class="sb-sec" style="margin-top:12px">Admin</div>
    <a class="sb-item" href="#" data-tab="admin" data-src="admin.html" onclick="switchTab('admin');return false;">
      <i class="ti ti-shield-lock sb-icon"></i><span class="sb-label">Admin</span>
    </a>
  </div>

  <div class="sb-spacer"></div>
  <div class="sb-foot">v1 · Internal · Bounce Daily</div>
</nav>

<div class="main" id="main">
  <iframe id="frame-dashboard" src="dashboard.html" data-src="dashboard.html" style="display:block;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-fleet" src="" data-src="fleet-km.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-parts" src="" data-src="parts-testing.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-tyre" src="" data-src="tyre-analysis.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-hub" src="" data-src="hub-control-tower.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-msl" src="" data-src="msl-dashboard.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>
  <iframe id="frame-admin" src="" data-src="admin.html" style="display:none;width:100%;height:100%;border:none;flex:1"></iframe>

</div>

<script>
const loaded = {};

function switchTab(tab) {
  // Hide all iframes
  document.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
  
  // Show target iframe, lazy-load if first visit
  const frame = document.getElementById('frame-' + tab);
  if (frame) {
    frame.style.display = 'block';
    if (!loaded[tab]) {
      frame.src = frame.dataset.src;
      loaded[tab] = true;
    }
  }

  // Update sidebar active state
  document.querySelectorAll('.sb-item').forEach(a => {
    a.classList.toggle('active', a.dataset.tab === tab);
  });

  // Update URL hash
  history.replaceState(null, '', '#' + tab);

  // Close mobile sidebar
  closeSidebar();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sb-overlay').classList.add('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sb-overlay').classList.remove('active');
}

// Route on load
(function() {
  const hash = window.location.hash.replace('#','');
  const valid = ['dashboard','fleet','parts','tyre','hub','msl','admin'];
  const target = valid.includes(hash) ? hash : 'dashboard';
  loaded['dashboard'] = true; // dashboard iframe already has src set
  if (target !== 'dashboard') switchTab(target);
})();
</script>

</body>
</html>
