<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Bounce Ops</title></head>
<body>
<script>
  // Check session — if exists go to dashboard, else go to login
  try {
    const s = JSON.parse(localStorage.getItem('sb_session')||'null');
    if (s && s.email) { window.location.replace('dashboard.html'); }
    else { window.location.replace('login.html'); }
  } catch(e) { window.location.replace('login.html'); }
</script>
</body></html>
