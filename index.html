<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bounce Service Info</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <link rel="stylesheet" href="bounce-theme.css?v=1780722254"/>
  <script src="auth-guard.js?v=1780722254"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);min-height:100vh;font-family:var(--font);display:flex;flex-direction:column}

    /* Topbar */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:28px;height:28px;border-radius:6px;object-fit:contain}
    .brand-name{font-size:14px;font-weight:800;color:var(--text)}
    .brand-name span{color:var(--red)}
    .user-info{display:flex;align-items:center;gap:12px}
    .user-email{font-size:11px;color:var(--muted)}
    .btn-out{padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
    .btn-out:hover{background:var(--red);color:#fff;border-color:var(--red)}

    /* Hero */
    .hero{padding:48px 28px 32px;text-align:center}
    .hero-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--red);font-weight:700;margin-bottom:10px}
    .hero-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.2}
    .hero-sub{font-size:13px;color:var(--muted)}

    /* Grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 28px 48px;max-width:1100px;margin:0 auto;width:100%}

    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;transition:border-color .2s, transform .2s, box-shadow .2s}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-color, var(--red));opacity:0;transition:opacity .2s}
    .card:hover{border-color:var(--accent-color, var(--red));transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
    .card:hover::before{opacity:1}
    .card-top{display:flex;align-items:center;justify-content:space-between}
    .card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .card-arrow{color:var(--border);font-size:14px;transition:color .2s, transform .2s}
    .card:hover .card-arrow{color:var(--accent-color, var(--red));transform:translateX(3px)}
    .card-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
    .card-desc{font-size:12px;color:var(--muted);line-height:1.55}
    .card-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:var(--bg);color:var(--muted);border:1px solid var(--border);width:fit-content;margin-top:auto}

    /* Empty */
    .empty-state{padding:80px 28px;text-align:center;color:var(--muted)}
    .empty-state i{font-size:36px;display:block;margin-bottom:12px;opacity:.3}

    @media(max-width:600px){
      .hero{padding:32px 16px 24px}
      .grid{grid-template-columns:1fr;padding:0 16px 32px}
      .topbar{padding:10px 16px}
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="https://bouncedaily.in/logo  (1).png" onerror="this.style.display='none'" alt="">
      <div class="brand-name">Bounce <span>Service Info</span></div>
    </div>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="btn-out" onclick="authLogout()">Sign out</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Internal Dashboard</div>
    <div class="hero-title">Service Operations</div>
    <div class="hero-sub">Select a dashboard to get started</div>
  </div>

  <div class="grid" id="grid"></div>

<script>
  const DASHBOARDS = [
    {
      key: 'rmc',
      href: 'dashboard.html',
      title: 'RMC Dashboard',
      desc: 'Job card analytics, cost breakdown, hub & city performance, OEM comparison.',
      icon: 'ti ti-chart-bar',
      accent: '#dc2626',
      iconBg: '#fef2f2',
      iconColor: '#dc2626',
      tag: 'Analytics'
    },
    {
      key: 'fleet_km',
      href: 'fleet-km.html',
      title: 'Fleet KM Analysis',
      desc: 'Odometer bucket cohorts, cost per KM, monthly fleet snapshots.',
      icon: 'ti ti-motorbike',
      accent: '#2563eb',
      iconBg: '#eff6ff',
      iconColor: '#2563eb',
      tag: 'Fleet'
    },
    {
      key: 'parts_testing',
      href: 'parts-testing.html',
      title: 'Parts Testing',
      desc: 'OEM vs test part performance, KM lifespan analysis.',
      icon: 'ti ti-test-pipe',
      accent: '#16a34a',
      iconBg: '#f0fdf4',
      iconColor: '#16a34a',
      tag: 'Parts'
    },
    {
      key: 'wear_tear',
      href: 'tyre-analysis.html',
      title: 'Wear & Tear Deep Dive',
      desc: 'Tyre & brake replacement analysis, repeat replacements, bike-level KM tracking.',
      icon: 'ti ti-chart-dots',
      accent: '#d97706',
      iconBg: '#fffbeb',
      iconColor: '#d97706',
      tag: 'Wear & Tear'
    },
    {
      key: 'hub_control_tower',
      href: 'hub-control-tower.html',
      title: 'Hub Control Tower',
      desc: 'Live hub status, inflow, runway and deployment tracking.',
      icon: 'ti ti-dashboard',
      accent: '#7c3aed',
      iconBg: '#faf5ff',
      iconColor: '#7c3aed',
      tag: 'Operations'
    }
  ];

  function render() {
    const perms   = typeof authPerms   === 'function' ? authPerms()   : {};
    const isAdmin = typeof authIsAdmin === 'function' ? authIsAdmin() : false;
    const email   = typeof authGetEmail=== 'function' ? authGetEmail(): '';

    document.getElementById('user-email').textContent = email;

    const visible = DASHBOARDS.filter(d => isAdmin || perms[d.key] !== false);
    const grid    = document.getElementById('grid');

    if (!visible.length) {
      grid.innerHTML = `<div class="empty-state"><i class="ti ti-lock"></i>No dashboards assigned.<br>Contact your admin.</div>`;
      return;
    }

    grid.innerHTML = visible.map(d => `
      <a class="card" href="${d.href}" style="--accent-color:${d.accent}">
        <div class="card-top">
          <div class="card-icon" style="background:${d.iconBg};color:${d.iconColor}">
            <i class="${d.icon}"></i>
          </div>
          <i class="card-arrow ti ti-arrow-right"></i>
        </div>
        <div>
          <div class="card-title">${d.title}</div>
          <div class="card-desc" style="margin-top:4px">${d.desc}</div>
        </div>
        <div class="card-tag"><i class="ti ti-point-filled" style="font-size:8px;color:${d.accent}"></i>${d.tag}</div>
      </a>`).join('');
  }

  render();
  window.addEventListener('auth-perms-updated', render);
</script>
</body>
</html>
